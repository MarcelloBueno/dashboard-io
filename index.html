<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ETN IO - Gestão de Projetos</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#DA291C;--blue:#0097A9;--orange:#F5842B;--green:#27AE60;--dark:#2D291C;--gray:#A7A8AA;--light:#F4F6F8;--white:#fff}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--light);display:flex;min-height:100vh;color:#333}
.sidebar{width:200px;background:var(--dark);color:var(--white);padding:20px 0;position:fixed;height:100vh;overflow-y:auto;z-index:10}
.sidebar .logo{text-align:center;padding:10px 16px 4px;font-size:1.15em;font-weight:700;color:var(--primary)}
.sidebar .sub{text-align:center;font-size:.7em;color:var(--gray);padding-bottom:18px;border-bottom:1px solid #444}
.sidebar nav{padding:14px 0}
.sidebar nav a{display:flex;align-items:center;padding:10px 20px;color:var(--gray);text-decoration:none;font-size:.88em;transition:.2s;border-left:3px solid transparent;cursor:pointer}
.sidebar nav a:hover,.sidebar nav a.active{color:var(--white);background:rgba(255,255,255,.08);border-left-color:var(--primary)}
.main{margin-left:200px;flex:1;min-height:100vh}
.header{background:var(--white);padding:14px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.06);position:sticky;top:0;z-index:5}
.header h1{font-size:1.15em;color:var(--dark)}
.user{display:flex;align-items:center;gap:10px;font-size:.88em;font-weight:600;color:var(--dark)}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82em}
.content{padding:24px 28px}
.page{display:none}.page.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--white);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);border-left:4px solid var(--primary)}
.stat-card h3{font-size:.78em;color:var(--gray);text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:1.8em;font-weight:700;color:var(--dark);margin-top:4px}
.stat-card.blue{border-left-color:var(--blue)}
.stat-card.green{border-left-color:var(--green)}
.stat-card.orange{border-left-color:var(--orange)}
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filters input,.filters select{padding:8px 14px;border:1px solid #ddd;border-radius:8px;font-size:.88em;background:var(--white)}
.filters input{flex:1;min-width:200px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--white);border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;transition:.2s;border-top:3px solid transparent}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.1)}
.card h3{font-size:.95em;color:var(--dark);margin-bottom:4px}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.72em;font-weight:600;color:#fff}
.badge.ativo{background:var(--blue)}.badge.concluido{background:var(--green)}.badge.planejamento{background:var(--orange)}.badge.pausado{background:var(--gray)}.badge.pendente{background:var(--gray)}
.progress-bar{height:6px;background:#eee;border-radius:3px;margin:10px 0 8px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:3px;transition:width .5s}
.card .desc{font-size:.82em;color:#666;margin:6px 0;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{display:flex;justify-content:space-between;font-size:.78em;color:var(--gray)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.detail-header{display:flex;gap:24px;align-items:center;background:var(--white);border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:20px}
.progress-circle{position:relative;flex-shrink:0}
.detail-header .info h2{font-size:1.2em;color:var(--dark);margin-bottom:6px}
.meta-row{display:flex;flex-wrap:wrap;gap:16px;margin-top:10px;font-size:.85em}
.meta-row b{color:var(--dark)}
.tabs{display:flex;gap:4px;background:var(--white);border-radius:12px;padding:6px;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:20px;flex-wrap:wrap}
.tabs button{padding:8px 16px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:.85em;color:var(--gray);transition:.2s;font-family:inherit}
.tabs button.active{background:var(--primary);color:var(--white)}
.tabs button:hover:not(.active){background:var(--light)}
.tab-content{background:var(--white);border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.05);min-height:300px}
.obj-list{list-style:none;padding:0}.obj-list li{padding:8px 0 8px 24px;position:relative;border-bottom:1px solid #f0f0f0;font-size:.88em}
.obj-list li::before{content:'\2713';position:absolute;left:0;color:var(--green);font-weight:700}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{background:var(--light);border-radius:8px;padding:12px}
.info-item .label{font-size:.75em;color:var(--gray);text-transform:uppercase}
.info-item .val{font-size:.95em;font-weight:600;color:var(--dark);margin-top:2px}
.phase-card{border:1px solid #eee;border-radius:10px;margin-bottom:12px;overflow:hidden}
.phase-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;cursor:pointer;background:var(--light);transition:.2s}
.phase-header:hover{background:#e8e8e8}
.phase-body{display:none;padding:16px;border-top:1px solid #eee}
.phase-body.open{display:block}
table{width:100%;border-collapse:collapse;font-size:.84em}
th{background:var(--dark);color:#fff;padding:8px 12px;text-align:left;font-weight:600}
td{padding:8px 12px;border-bottom:1px solid #eee}
.timeline-item{display:flex;gap:14px;padding:12px 0;border-left:2px solid #eee;margin-left:8px;padding-left:20px;position:relative}
.timeline-item .dot{width:12px;height:12px;border-radius:50%;position:absolute;left:-7px}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.doc-card{background:var(--light);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:.2s;border:1px solid #eee}
.doc-card:hover{border-color:var(--blue);transform:translateY(-2px)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.85em;font-weight:600;color:var(--dark);margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:.88em;font-family:inherit}
.form-group textarea{resize:vertical;height:80px}
.btn{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:.88em;font-weight:600;font-family:inherit;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#b8221a}
.btn-secondary{background:var(--blue);color:#fff}.btn-secondary:hover{background:#007a8a}
.btn-back{background:var(--light);color:var(--dark);border:1px solid #ddd}.btn-back:hover{background:#e0e0e0}
.toast{position:fixed;bottom:30px;right:30px;background:var(--dark);color:#fff;padding:14px 24px;border-radius:10px;font-size:.88em;opacity:0;transform:translateY(20px);transition:.3s;z-index:100;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:50;justify-content:center;align-items:center}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:14px;padding:28px;width:90%;max-width:500px;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal h3{margin-bottom:16px;color:var(--dark)}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.sidebar{width:60px}.sidebar .logo,.sidebar .sub,.sidebar nav a span{display:none}.main{margin-left:60px}.cards{grid-template-columns:1fr}.edit-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo">ETN Soluções</div>
<div class="sub">IO – Inteligência Operacional</div>
<nav>
<a class="active" onclick="navigateTo('dashboard',this)"><span>≡ Dashboard</span></a>
<a onclick="navigateTo('metricas',this)"><span>☆ Métricas</span></a>
<a onclick="navigateTo('novo',this)"><span>+ Novo Projeto</span></a>
</nav>
</div>

<div class="main">
<div class="header">
<h1 id="pageTitle">Dashboard de Projetos</h1>
<div class="user"><span>Marcello Kaio</span><div class="avatar">MK</div></div>
</div>
<div class="content">

<!-- DASHBOARD -->
<div id="pageDashboard" class="page active">
<div class="stats" id="statsContainer"></div>
<div class="filters">
<input type="text" id="searchInput" placeholder="Buscar projeto..." oninput="filterProjects()">
<select id="filterStatus" onchange="filterProjects()">
<option value="">Status</option>
<option value="Ativo">Ativo</option>
<option value="Concluído">Concluído</option>
<option value="Planejamento">Planejamento</option>
<option value="Pausado">Pausado</option>
</select>
<select id="filterCategoria" onchange="filterProjects()">
<option value="">Categoria</option>
<option value="Data Analytics">Data Analytics</option>
<option value="Soluções">Soluções</option>
<option value="Automação">Automação</option>
<option value="Capacitação">Capacitação</option>
</select>
</div>
<div class="cards" id="cardsContainer"><p style="color:#999">Carregando projetos...</p></div>
</div>

<!-- DETALHES -->
<div id="pageDetalhes" class="page">
<button class="btn btn-back" onclick="navigateTo('dashboard',document.querySelector('.sidebar nav a'))" style="margin-bottom:16px">← Voltar</button>
<div id="detailHeader" class="detail-header"></div>
<div class="tabs" id="tabsBar">
<button class="active" onclick="switchTab('overview',this)">Visão Geral</button>
<button onclick="switchTab('phases',this)">Fases e Tarefas</button>
<button onclick="switchTab('feedback',this)">Feedback</button>
<button onclick="switchTab('documents',this)">Documentos</button>
<button onclick="switchTab('history',this)">Histórico</button>
<button onclick="switchTab('timeline',this)">Timeline</button>
</div>
<div id="tabContent" class="tab-content"></div>
</div>

<!-- METRICAS -->
<div id="pageMetricas" class="page">
<div class="stats" id="metricsStats"></div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">
<div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)"><h3 style="margin-bottom:15px;font-size:.95em">Status dos Projetos</h3><canvas id="chartStatus" height="200"></canvas></div>
<div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)"><h3 style="margin-bottom:15px;font-size:.95em">Categorias</h3><canvas id="chartCategoria" height="200"></canvas></div>
</div>
<div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-top:20px"><h3 style="margin-bottom:15px;font-size:.95em">Progresso por Projeto</h3><canvas id="chartProgresso" height="280"></canvas></div>
</div>

<!-- NOVO PROJETO -->
<div id="pageNovo" class="page">
<div style="background:#fff;border-radius:12px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,.05);max-width:700px">
<h2 style="margin-bottom:20px;color:var(--dark)">Criar Novo Projeto</h2>
<div class="edit-row">
<div class="form-group"><label>Título *</label><input type="text" id="fTitulo"></div>
<div class="form-group"><label>Responsável *</label><input type="text" id="fResp"></div>
</div>
<div class="form-group"><label>Descrição *</label><textarea id="fDesc"></textarea></div>
<div class="edit-row">
<div class="form-group"><label>Categoria</label><select id="fCat"><option value="Data Analytics">Data Analytics</option><option value="Soluções">Soluções</option><option value="Automação">Automação</option><option value="Capacitação">Capacitação</option></select></div>
<div class="form-group"><label>Prioridade</label><select id="fPri"><option value="Alta">Alta</option><option value="Média" selected>Média</option><option value="Baixa">Baixa</option></select></div>
</div>
<div class="edit-row">
<div class="form-group"><label>Data Início</label><input type="date" id="fInicio"></div>
<div class="form-group"><label>Data Fim</label><input type="date" id="fFim"></div>
</div>
<div class="form-group"><label>Orçamento</label><input type="text" id="fOrc" placeholder="Ex: R$ 5.000 ou Interno"></div>
<button class="btn btn-primary" onclick="createProject()">Criar Projeto</button>
</div>
</div>

</div><!-- /content -->
</div><!-- /main -->

<!-- MODAL EDITAR -->
<div id="editModal" class="modal-overlay">
<div class="modal">
<h3>Editar Projeto</h3>
<div class="form-group"><label>Título</label><input type="text" id="eTitulo"></div>
<div class="form-group"><label>Descrição</label><textarea id="eDesc"></textarea></div>
<div class="edit-row">
<div class="form-group"><label>Status</label><select id="eStatus"><option>Ativo</option><option>Concluído</option><option>Planejamento</option><option>Pausado</option></select></div>
<div class="form-group"><label>Progresso (%)</label><input type="number" id="eProgresso" min="0" max="100"></div>
</div>
<div class="edit-row">
<div class="form-group"><label>Prioridade</label><select id="ePri"><option>Alta</option><option>Média</option><option>Baixa</option></select></div>
<div class="form-group"><label>Orçamento</label><input type="text" id="eOrc"></div>
</div>
<div style="display:flex;gap:10px;margin-top:16px">
<button class="btn btn-primary" onclick="saveProject()">Salvar</button>
<button class="btn btn-back" onclick="closeModal()">Cancelar</button>
<button class="btn" style="background:#E74C3C;color:#fff;margin-left:auto" onclick="deleteProject()">Excluir</button>
</div>
</div>
</div>

<div id="toast" class="toast"></div>

<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
var SUPABASE_URL = 'https://huhtjyauecblkqiaeqok.supabase.co';
var SUPABASE_KEY = 'sb_publishable_6AUA3wduvC1vsZyRkl8Ahg_ZymacI78';
var API = SUPABASE_URL + '/rest/v1';
var STORAGE = SUPABASE_URL + '/storage/v1';
var HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};
var HEADERS_GET = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY
};

var projetos = [];
var currentProject = null;
var currentRating = 0;

// ============================================================
// API FUNCTIONS (CRUD)
// ============================================================
function apiGet(table, query) {
  return fetch(API + '/' + table + (query || ''), {headers: HEADERS_GET}).then(function(r){return r.json();});
}
function apiPost(table, data) {
  return fetch(API + '/' + table, {method:'POST', headers:HEADERS, body:JSON.stringify(data)}).then(function(r){return r.json();});
}
function apiPatch(table, id, data) {
  return fetch(API + '/' + table + '?id=eq.' + id, {method:'PATCH', headers:HEADERS, body:JSON.stringify(data)}).then(function(r){return r.json();});
}
function apiDelete(table, id) {
  return fetch(API + '/' + table + '?id=eq.' + id, {method:'DELETE', headers:HEADERS_GET}).then(function(r){return r.ok;});
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function getStatusClass(s){var m={'Ativo':'ativo','Conclu\u00eddo':'concluido','Planejamento':'planejamento','Pausado':'pausado','Pendente':'pendente'};return m[s]||'pausado';}
function getStatusColor(s){var m={'Ativo':'#0097A9','Conclu\u00eddo':'#27AE60','Planejamento':'#F5842B','Pausado':'#A7A8AA','Pendente':'#A7A8AA'};return m[s]||'#A7A8AA';}
function formatDate(d){if(!d)return'-';var p=d.split('T')[0].split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function generateStars(n){var s='';for(var i=1;i<=5;i++)s+=(i<=n?'\u2605':'\u2606');return s;}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000);}

// ============================================================
// NAVIGATION
// ============================================================
function navigateTo(page, el) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.sidebar nav a').forEach(function(a){a.classList.remove('active');});
  if(el) el.classList.add('active');
  var titles = {'dashboard':'Dashboard de Projetos','metricas':'M\u00e9tricas do Portf\u00f3lio','novo':'Novo Projeto','detalhes':'Detalhes do Projeto'};
  document.getElementById('pageTitle').textContent = titles[page] || 'Dashboard';
  var pages = {'dashboard':'pageDashboard','metricas':'pageMetricas','novo':'pageNovo','detalhes':'pageDetalhes'};
  var target = document.getElementById(pages[page]);
  if(target) target.classList.add('active');
  if(page === 'dashboard') loadDashboard();
  if(page === 'metricas') renderMetrics();
}

// ============================================================
// DASHBOARD - LOAD FROM SUPABASE
// ============================================================
function loadDashboard() {
  apiGet('projetos', '?order=id').then(function(data) {
    projetos = data;
    renderStats();
    renderCards(projetos);
  }).catch(function(e){showToast('Erro ao carregar projetos');console.error(e);});
}

function renderStats() {
  var total = projetos.length;
  var ativos = projetos.filter(function(p){return p.status==='Ativo';}).length;
  var concluidos = projetos.filter(function(p){return p.status==='Conclu\u00eddo';}).length;
  var media = total ? Math.round(projetos.reduce(function(a,p){return a+p.progresso;},0)/total) : 0;
  document.getElementById('statsContainer').innerHTML =
    '<div class="stat-card"><h3>Total de Projetos</h3><div class="value">'+total+'</div></div>'+
    '<div class="stat-card blue"><h3>Ativos</h3><div class="value">'+ativos+'</div></div>'+
    '<div class="stat-card green"><h3>Conclu\u00eddos</h3><div class="value">'+concluidos+'</div></div>'+
    '<div class="stat-card orange"><h3>Progresso M\u00e9dio</h3><div class="value">'+media+'%</div></div>';
}

function renderCards(list) {
  var c = document.getElementById('cardsContainer');
  if(!list.length){c.innerHTML='<p style="color:#999;text-align:center;grid-column:1/-1">Nenhum projeto encontrado.</p>';return;}
  c.innerHTML = list.map(function(p){
    var sc=getStatusClass(p.status), color=getStatusColor(p.status);
    return '<div class="card" onclick="openProject('+p.id+')"><div class="card-header"><h3>'+p.titulo+'</h3><span class="badge '+sc+'">'+p.status+'</span></div>'+
    '<div class="desc">'+(p.descricao||'')+'</div>'+
    '<div class="progress-bar"><div class="fill" style="width:'+p.progresso+'%;background:'+color+'"></div></div>'+
    '<div class="meta"><span>'+p.responsavel+'</span><span>'+p.progresso+'%</span></div></div>';
  }).join('');
}

function filterProjects() {
  var st=document.getElementById('filterStatus').value;
  var cat=document.getElementById('filterCategoria').value;
  var txt=document.getElementById('searchInput').value.toLowerCase();
  var f=projetos;
  if(st)f=f.filter(function(p){return p.status===st;});
  if(cat)f=f.filter(function(p){return p.categoria===cat;});
  if(txt)f=f.filter(function(p){return (p.titulo||'').toLowerCase().indexOf(txt)>=0||(p.descricao||'').toLowerCase().indexOf(txt)>=0||(p.responsavel||'').toLowerCase().indexOf(txt)>=0;});
  renderCards(f);
}

// ============================================================
// PROJECT DETAIL
// ============================================================
function openProject(id) {
  currentProject = projetos.filter(function(p){return p.id===id;})[0];
  if(!currentProject)return;
  navigateTo('detalhes', null);
  renderDetailHeader(currentProject);
  switchTab('overview', document.querySelector('#tabsBar button'));
}

function renderDetailHeader(p) {
  var color=getStatusColor(p.status);
  var r=40,circ=2*Math.PI*r,off=circ-(p.progresso/100)*circ;
  document.getElementById('detailHeader').innerHTML =
    '<div class="progress-circle"><svg width="100" height="100"><circle cx="50" cy="50" r="'+r+'" fill="none" stroke="#eee" stroke-width="8"/>'+
    '<circle cx="50" cy="50" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="8" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" stroke-linecap="round" transform="rotate(-90 50 50)"/>'+
    '</svg><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.2em;font-weight:700">'+p.progresso+'%</div></div>'+
    '<div class="info" style="flex:1"><h2>'+p.titulo+'</h2><p style="color:#666;font-size:.85em">'+(p.descricao||'')+'</p>'+
    '<div class="meta-row"><span><b>Status:</b> <span class="badge '+getStatusClass(p.status)+'">'+p.status+'</span></span>'+
    '<span><b>Resp.:</b> '+p.responsavel+'</span>'+
    '<span><b>Per\u00edodo:</b> '+formatDate(p.data_inicio)+' a '+formatDate(p.data_fim)+'</span>'+
    '<span><b>Prioridade:</b> '+p.prioridade+'</span>'+
    '<span><b>Or\u00e7amento:</b> '+(p.orcamento||'N/A')+'</span></div></div>'+
    '<button class="btn btn-secondary" onclick="openEditModal()" style="align-self:flex-start">Editar</button>';
}

// ============================================================
// EDIT / DELETE PROJECT (REAL CRUD)
// ============================================================
function openEditModal() {
  var p = currentProject;
  document.getElementById('eTitulo').value = p.titulo;
  document.getElementById('eDesc').value = p.descricao || '';
  document.getElementById('eStatus').value = p.status;
  document.getElementById('eProgresso').value = p.progresso;
  document.getElementById('ePri').value = p.prioridade;
  document.getElementById('eOrc').value = p.orcamento || '';
  document.getElementById('editModal').classList.add('show');
}
function closeModal(){document.getElementById('editModal').classList.remove('show');}

function saveProject() {
  var data = {
    titulo: document.getElementById('eTitulo').value,
    descricao: document.getElementById('eDesc').value,
    status: document.getElementById('eStatus').value,
    progresso: parseInt(document.getElementById('eProgresso').value) || 0,
    prioridade: document.getElementById('ePri').value,
    orcamento: document.getElementById('eOrc').value,
    updated_at: new Date().toISOString()
  };
  apiPatch('projetos', currentProject.id, data).then(function(r){
    if(r && r.length) {
      currentProject = r[0];
      var idx = projetos.findIndex(function(p){return p.id===currentProject.id;});
      if(idx>=0) projetos[idx] = currentProject;
      renderDetailHeader(currentProject);
      closeModal();
      showToast('Projeto atualizado com sucesso!');
      apiPost('historico', {projeto_id:currentProject.id, texto:'Projeto editado: '+data.status+' ('+data.progresso+'%)', tipo:'atualizacao'});
    }
  }).catch(function(){showToast('Erro ao salvar');});
}

function deleteProject() {
  if(!confirm('Tem certeza que deseja excluir o projeto "'+currentProject.titulo+'"?')) return;
  apiDelete('projetos', currentProject.id).then(function(ok){
    if(ok){showToast('Projeto exclu\u00eddo!');navigateTo('dashboard',document.querySelector('.sidebar nav a'));}
    else showToast('Erro ao excluir');
  });
}

// ============================================================
// TABS
// ============================================================
function switchTab(name, btn) {
  document.querySelectorAll('#tabsBar button').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  var fn={'overview':renderOverview,'phases':renderPhases,'feedback':renderFeedback,'documents':renderDocuments,'history':renderHistory,'timeline':renderTimeline};
  if(fn[name]) fn[name](currentProject);
}

function renderOverview(p) {

  // Load objectives from description or show defaults
  tc.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">'+
    '<div><h3 style="margin-bottom:12px">Descri\u00e7\u00e3o</h3><p style="font-size:.9em;color:#555;line-height:1.6">'+(p.descricao||'Sem descri\u00e7\u00e3o')+'</p></div>'+
    '<div><h3 style="margin-bottom:12px">Informa\u00e7\u00f5es</h3><div class="info-grid">'+
    '<div class="info-item"><div class="label">Categoria</div><div class="val">'+(p.categoria||'-')+'</div></div>'+
    '<div class="info-item"><div class="label">Resp.</div><div class="val">'+p.responsavel+'</div></div>'+
    '<div class="info-item"><div class="label">Prioridade</div><div class="val">'+p.prioridade+'</div></div>'+
    '<div class="info-item"><div class="label">Or\u00e7amento</div><div class="val">'+(p.orcamento||'-')+'</div></div>'+
    '<div class="info-item"><div class="label">In\u00edcio</div><div class="val">'+formatDate(p.data_inicio)+'</div></div>'+
    '<div class="info-item"><div class="label">Fim</div><div class="val">'+formatDate(p.data_fim)+'</div></div>'+

// ============================================================
// PHASES & TASKS (FROM SUPABASE)
// ============================================================
function renderPhases(p) {
  var tc=document.getElementById('tabContent');
  tc.innerHTML='<p style="color:#999">Carregando fases...</p>';
  apiGet('fases', '?projeto_id=eq.'+p.id+'&order=id').then(function(fases){
    if(!fases.length){tc.innerHTML='<p style="color:#999">Nenhuma fase cadastrada.</p>';return;}
    var promises = fases.map(function(f){return apiGet('tarefas','?fase_id=eq.'+f.id+'&order=id');});
    Promise.all(promises).then(function(allTarefas){
      tc.innerHTML = fases.map(function(f,i){
        var color=getStatusColor(f.status);
        var tarefas=allTarefas[i]||[];
        return '<div class="phase-card"><div class="phase-header" onclick="togglePhase('+i+')"><h4 style="flex:1;font-size:.92em">'+f.titulo+'</h4>'+
        '<div><span class="badge" style="background:'+color+'">'+f.status+'</span> <span style="margin-left:8px;font-size:.85em">'+f.progresso+'%</span></div></div>'+
        '<div class="phase-body" id="phase-'+i+'"><p style="font-size:.82em;color:#666;margin-bottom:10px">'+formatDate(f.data_inicio)+' a '+formatDate(f.data_fim)+'</p>'+
        '<table><thead><tr><th>Tarefa</th><th>Resp.</th><th>Prazo</th><th>Status</th></tr></thead><tbody>'+
        tarefas.map(function(t){return '<tr><td>'+t.titulo+'</td><td>'+(t.responsavel||'-')+'</td><td>'+formatDate(t.prazo)+'</td><td><span class="badge" style="background:'+getStatusColor(t.status)+';font-size:.7em">'+t.status+'</span></td></tr>';}).join('')+
        '</tbody></table></div></div>';
      }).join('');
    });
  });
}
function togglePhase(i){var el=document.getElementById('phase-'+i);if(el)el.classList.toggle('open');}

// ============================================================
// FEEDBACK (FROM SUPABASE)
// ============================================================
function renderFeedback(p) {
  var tc=document.getElementById('tabContent');
  tc.innerHTML='<p style="color:#999">Carregando feedbacks...</p>';
  apiGet('feedbacks','?projeto_id=eq.'+p.id+'&order=created_at.desc').then(function(feedbacks){
    var list = feedbacks.map(function(f){
      return '<div style="background:var(--light);border-radius:10px;padding:15px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><b>'+f.autor+'</b><span style="color:#999;font-size:.8em">'+formatDate(f.created_at)+'</span></div>'+
      '<div style="color:#F5842B;margin-bottom:6px">'+generateStars(f.nota)+'</div>'+
      '<p style="color:#666;font-size:.88em">'+(f.comentario||'')+'</p></div>';
    }).join('');
    tc.innerHTML = '<div>'+list+'</div>'+
      '<div style="background:var(--light);border-radius:12px;padding:20px;margin-top:20px"><h3 style="margin-bottom:12px">Novo Feedback</h3>'+
      '<div id="starRating" style="font-size:1.5em;color:#ddd;cursor:pointer;margin-bottom:12px">'+
      '<span onmouseover="hoverStar(1)" onmouseout="resetStars()" onclick="setRating(1)">\u2606</span>'+
      '<span onmouseover="hoverStar(2)" onmouseout="resetStars()" onclick="setRating(2)">\u2606</span>'+
      '<span onmouseover="hoverStar(3)" onmouseout="resetStars()" onclick="setRating(3)">\u2606</span>'+
      '<span onmouseover="hoverStar(4)" onmouseout="resetStars()" onclick="setRating(4)">\u2606</span>'+
      '<span onmouseover="hoverStar(5)" onmouseout="resetStars()" onclick="setRating(5)">\u2606</span></div>'+
      '<input type="text" id="fbAutor" placeholder="Seu nome" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px;font-family:inherit">'+
      '<textarea id="fbText" placeholder="Seu coment\u00e1rio..." style="width:100%;height:80px;border:1px solid #ddd;border-radius:8px;padding:10px;font-family:inherit;resize:vertical"></textarea>'+
      '<button class="btn btn-primary" onclick="submitFeedback('+p.id+')" style="margin-top:10px">Enviar</button></div>';
  });
}

function setRating(n){currentRating=n;updateStars(n);}
function hoverStar(n){updateStars(n);}
function resetStars(){updateStars(currentRating);}
function updateStars(n){var spans=document.querySelectorAll('#starRating span');spans.forEach(function(s,i){s.textContent=(i<n)?'\u2605':'\u2606';s.style.color=(i<n)?'#F5842B':'#ddd';});}

function submitFeedback(pid) {
  var autor=document.getElementById('fbAutor').value;
  var txt=document.getElementById('fbText').value;
  if(!currentRating||!autor||!txt){showToast('Preencha nome, nota e coment\u00e1rio');return;}
  apiPost('feedbacks',{projeto_id:pid,autor:autor,nota:currentRating,comentario:txt}).then(function(){
    currentRating=0;showToast('Feedback enviado com sucesso!');renderFeedback(currentProject);
  }).catch(function(){showToast('Erro ao enviar feedback');});
}

// ============================================================
// DOCUMENTS (SUPABASE STORAGE)
// ============================================================
function renderDocuments(p) {
  var tc=document.getElementById('tabContent');
  tc.innerHTML='<p style="color:#999">Carregando documentos...</p>';
  apiGet('documentos','?projeto_id=eq.'+p.id+'&order=created_at.desc').then(function(docs){
    var list = docs.map(function(d){
      return '<div class="doc-card" onclick="downloadDoc(\''+d.url+'\',\''+d.nome+'\')"><div style="font-size:2em;margin-bottom:8px">'+getDocIcon(d.tipo)+'</div><div style="font-weight:600;font-size:.85em">'+d.nome+'</div><div style="color:#999;font-size:.72em;margin-top:4px">'+(d.tipo||'')+' - '+formatDate(d.created_at)+'</div></div>';
    }).join('');
    tc.innerHTML = '<div class="doc-grid">'+list+'</div>'+
      '<div style="margin-top:20px;padding:20px;background:var(--light);border-radius:12px;border:2px dashed #ccc;text-align:center">'+
      '<input type="file" id="fileInput" style="display:none" onchange="uploadDocument('+p.id+')">'+
      '<button class="btn btn-secondary" onclick="document.getElementById(\'fileInput\').click()">Fazer Upload</button>'+
      '<p style="color:#999;font-size:.82em;margin-top:8px">Arraste ou clique para enviar documentos</p></div>';
  });
}
function getDocIcon(t){var m={'PDF':'PDF','pdf':'PDF','Word':'DOC','docx':'DOC','Excel':'XLS','xlsx':'XLS','PowerPoint':'PPT','pptx':'PPT','Power BI':'PBI'};return m[t]||'DOC';}

function uploadDocument(pid) {
  var input = document.getElementById('fileInput');
  var file = input.files[0];
  if(!file){showToast('Selecione um arquivo');return;}
  showToast('Enviando '+file.name+'...');
  var path = 'projeto-'+pid+'/'+Date.now()+'-'+file.name;
  fetch(STORAGE+'/object/documentos/'+path, {
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':file.type},
    body:file
  }).then(function(r){
    if(r.ok) {
      var url = STORAGE+'/object/public/documentos/'+path;
      return apiPost('documentos',{projeto_id:pid,nome:file.name,tipo:file.name.split('.').pop().toUpperCase(),tamanho:(file.size/1024).toFixed(0)+'KB',url:url});
    } else throw new Error('Upload falhou');
  }).then(function(){
    showToast('Documento enviado com sucesso!');
    renderDocuments(currentProject);
    input.value='';
  }).catch(function(e){showToast('Erro no upload: '+e.message);});
}

function downloadDoc(url, nome) {
  if(url) {var a=document.createElement('a');a.href=url;a.download=nome;a.target='_blank';a.click();}
  else showToast('URL n\u00e3o dispon\u00edvel');
}

// ============================================================
// HISTORY (FROM SUPABASE)
// ============================================================
function renderHistory(p) {
  var tc=document.getElementById('tabContent');
  apiGet('historico','?projeto_id=eq.'+p.id+'&order=created_at.desc').then(function(hist){
    if(!hist.length){tc.innerHTML='<p style="color:#999">Nenhum registro no hist\u00f3rico.</p>';return;}
    tc.innerHTML='<div class="timeline-list">'+hist.map(function(h){
      var color={'criacao':'#27AE60','atualizacao':'#0097A9','conclusao':'#F5842B','alerta':'#E74C3C'}[h.tipo]||'#A7A8AA';
      return '<div class="timeline-item"><div class="dot" style="background:'+color+'"></div><div><b>'+formatDate(h.created_at)+'</b><p style="margin:4px 0 0;color:#666;font-size:.88em">'+h.texto+'</p></div></div>';
    }).join('')+'</div>';
  });
}

// ============================================================
// TIMELINE / GANTT (FROM SUPABASE)
// ============================================================
function renderTimeline(p) {
  var tc=document.getElementById('tabContent');
  tc.innerHTML='<p style="color:#999">Carregando timeline...</p>';
  apiGet('fases','?projeto_id=eq.'+p.id+'&order=id').then(function(fases){
    if(!fases.length){tc.innerHTML='<p style="color:#999">Sem fases cadastradas.</p>';return;}
    var allDates=[];
    fases.forEach(function(f){if(f.data_inicio)allDates.push(new Date(f.data_inicio));if(f.data_fim)allDates.push(new Date(f.data_fim));});
    var minD=new Date(Math.min.apply(null,allDates)),maxD=new Date(Math.max.apply(null,allDates));
    var totalDays=(maxD-minD)/86400000+1;
    var html='<div style="overflow-x:auto"><div style="min-width:600px">';
    html+='<div style="display:flex;justify-content:space-between;font-size:.75em;color:#999;margin-bottom:10px"><span>'+formatDate(minD.toISOString().split('T')[0])+'</span><span>'+formatDate(maxD.toISOString().split('T')[0])+'</span></div>';
    fases.forEach(function(f){
      var s=new Date(f.data_inicio),e=new Date(f.data_fim);
      var left=((s-minD)/86400000)/totalDays*100;
      var width=((e-s)/86400000+1)/totalDays*100;
      var color=getStatusColor(f.status);
      html+='<div style="margin-bottom:14px"><div style="font-size:.82em;font-weight:600;margin-bottom:4px">'+f.titulo+'</div>'+
      '<div style="position:relative;height:26px;background:#f0f0f0;border-radius:12px"><div style="position:absolute;left:'+left+'%;width:'+width+'%;height:100%;background:'+color+';border-radius:12px;opacity:.85"></div></div></div>';
    });
    html+='</div></div>';
    tc.innerHTML=html;
  });
}

// ============================================================
// METRICS
// ============================================================
function renderMetrics() {
  apiGet('projetos','?order=id').then(function(data){
    projetos=data;
    var total=projetos.length;
    var ativos=projetos.filter(function(p){return p.status==='Ativo';}).length;
    var concluidos=projetos.filter(function(p){return p.status==='Conclu\u00eddo';}).length;
    var plan=projetos.filter(function(p){return p.status==='Planejamento';}).length;
    var media=total?Math.round(projetos.reduce(function(a,p){return a+p.progresso;},0)/total):0;
    document.getElementById('metricsStats').innerHTML=
      '<div class="stat-card"><h3>Total</h3><div class="value">'+total+'</div></div>'+
      '<div class="stat-card blue"><h3>Ativos</h3><div class="value">'+ativos+'</div></div>'+
      '<div class="stat-card green"><h3>Conclu\u00eddos</h3><div class="value">'+concluidos+'</div></div>'+
      '<div class="stat-card orange"><h3>Progresso M\u00e9dio</h3><div class="value">'+media+'%</div></div>';
    setTimeout(function(){
      drawBarChart('chartStatus',['Ativo','Conclu\u00eddo','Planejamento'],[ativos,concluidos,plan],['#0097A9','#27AE60','#F5842B']);
      var cats={};projetos.forEach(function(p){cats[p.categoria]=(cats[p.categoria]||0)+1;});
      var ck=Object.keys(cats),cv=ck.map(function(k){return cats[k];});
      drawPieChart('chartCategoria',cv,ck,['#DA291C','#0097A9','#F5842B','#27AE60','#9B59B6']);
      var names=projetos.map(function(p){return p.titulo.length>22?p.titulo.substring(0,22)+'...':p.titulo;});
      var progs=projetos.map(function(p){return p.progresso;});
      var colors=projetos.map(function(p){return getStatusColor(p.status);});
      drawHorizontalBarChart('chartProgresso',names,progs,colors);
    },150);
  });
}

function drawBarChart(id,labels,data,colors){var c=document.getElementById(id);if(!c)return;var ctx=c.getContext('2d');var w=c.width,h=c.height;ctx.clearRect(0,0,w,h);var max=Math.max.apply(null,data)||1;var bw=w/(data.length*2+1);data.forEach(function(v,i){var bh=(v/max)*(h-50);var x=bw*(2*i+1);ctx.fillStyle=colors[i%colors.length];ctx.beginPath();ctx.roundRect(x,h-35-bh,bw,bh,6);ctx.fill();ctx.fillStyle='#333';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText(v,x+bw/2,h-40-bh);ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.fillText(labels[i],x+bw/2,h-12);});}

function drawPieChart(id,data,labels,colors){var c=document.getElementById(id);if(!c)return;var ctx=c.getContext('2d');var w=c.width,h=c.height;ctx.clearRect(0,0,w,h);var total=data.reduce(function(a,b){return a+b;},0);if(!total)return;var cx=w/2-60,cy=h/2,r=Math.min(cx,cy)-10;var angle=-Math.PI/2;data.forEach(function(v,i){var slice=(v/total)*2*Math.PI;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+slice);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();angle+=slice;});var ly=30;labels.forEach(function(l,i){ctx.fillStyle=colors[i%colors.length];ctx.fillRect(w-120,ly-8,12,12);ctx.fillStyle='#333';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.fillText(l+' ('+data[i]+')',w-104,ly);ly+=22;});}

function drawHorizontalBarChart(id,labels,data,colors){var c=document.getElementById(id);if(!c)return;var ctx=c.getContext('2d');var w=c.width,h=c.height;ctx.clearRect(0,0,w,h);var barH=Math.min(20,(h-20)/data.length-4);var lw=140,maxW=w-lw-50;data.forEach(function(v,i){var y=10+i*(barH+6);ctx.fillStyle='#666';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(labels[i],lw-5,y+barH/2+3);ctx.fillStyle='#f0f0f0';ctx.fillRect(lw,y,maxW,barH);ctx.fillStyle=colors[i%colors.length];ctx.fillRect(lw,y,(v/100)*maxW,barH);ctx.fillStyle='#333';ctx.font='bold 10px sans-serif';ctx.textAlign='left';ctx.fillText(v+'%',lw+(v/100)*maxW+4,y+barH/2+3);});}

// ============================================================
// CREATE PROJECT (REAL - SAVES TO SUPABASE)
// ============================================================
function createProject() {
  var t=document.getElementById('fTitulo').value;
  var d=document.getElementById('fDesc').value;
  var r=document.getElementById('fResp').value;
  if(!t||!d||!r){showToast('Preencha t\u00edtulo, descri\u00e7\u00e3o e respons\u00e1vel');return;}
  var np = {
    titulo:t, descricao:d, responsavel:r,
    categoria:document.getElementById('fCat').value,
    prioridade:document.getElementById('fPri').value,
    data_inicio:document.getElementById('fInicio').value||null,
    data_fim:document.getElementById('fFim').value||null,
    orcamento:document.getElementById('fOrc').value||'Interno',
    status:'Planejamento', progresso:0
  };
  apiPost('projetos', np).then(function(r){
    if(r&&r.length){
      showToast('Projeto "'+t+'" criado com sucesso!');
      apiPost('historico',{projeto_id:r[0].id,texto:'Projeto criado',tipo:'criacao'});
      document.getElementById('fTitulo').value='';document.getElementById('fDesc').value='';document.getElementById('fResp').value='';
      navigateTo('dashboard',document.querySelector('.sidebar nav a'));
    }
  }).catch(function(){showToast('Erro ao criar projeto');});
}
