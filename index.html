function dBC(id,lb,dt,cl){
  var cv=document.getElementById(id);if(!cv)return;var ctx=cv.getContext("2d"),w=cv.width,h=cv.height;ctx.clearRect(0,0,w,h);
  var mx=Math.max.apply(null,dt)||1,bw=w/(dt.length*2+1);
  dt.forEach(function(v,i){var bh=(v/mx)*(h-50);var x=bw*(2*i+1);ctx.fillStyle=cl[i%cl.length];ctx.fillRect(x,h-35-bh,bw,bh);ctx.fillStyle="#333";ctx.font="bold 12px sans-serif";ctx.textAlign="center";ctx.fillText(v,x+bw/2,h-39-bh);ctx.fillStyle="#666";ctx.font="10px sans-serif";ctx.fillText(lb[i],x+bw/2,h-15);});
}
function dPC(id,dt,lb,cl){
  var cv=document.getElementById(id);if(!cv)return;var ctx=cv.getContext("2d"),w=cv.width,h=cv.height;ctx.clearRect(0,0,w,h);
  var tt=dt.reduce(function(a,b){return a+b;},0);if(!tt)return;var cx=w/2-55,cy=h/2,r=Math.min(cx,cy)-10,an=-Math.PI/2;
  dt.forEach(function(v,i){var sl=(v/tt)*2*Math.PI;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,an,an+sl);ctx.closePath();ctx.fillStyle=cl[i%cl.length];ctx.fill();an+=sl;});
  var ly=25;lb.forEach(function(l,i){ctx.fillStyle=cl[i%cl.length];ctx.fillRect(w-105,ly-7,10,10);ctx.fillStyle="#333";ctx.font="10px sans-serif";ctx.textAlign="left";ctx.fillText(l+" ("+dt[i]+")",w-90,ly);ly+=18;});
}
function dHC(id,lb,dt,cl){
  var cv=document.getElementById(id);if(!cv)return;var ctx=cv.getContext("2d"),w=cv.width,h=cv.height;ctx.clearRect(0,0,w,h);
  var bh=Math.min(20,(h-10)/dt.length-3),lw=120,mw=w-lw-45;
  dt.forEach(function(v,i){var y=5+i*(bh+3);ctx.fillStyle="#666";ctx.font="9px sans-serif";ctx.textAlign="right";ctx.fillText(lb[i],lw-4,y+bh/2+3);ctx.fillStyle="#f0f0f0";ctx.fillRect(lw,y,mw,bh);ctx.fillStyle=cl[i%cl.length];ctx.fillRect(lw,y,(v/100)*mw,bh);ctx.fillStyle="#333";ctx.font="9px sans-serif";ctx.textAlign="left";ctx.fillText(v+"%",lw+(v/100)*mw+3,y+bh/2+3);});
}
